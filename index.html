<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 제조혁신 뉴스 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;900&family=Inter:wght@400;500;600;700;800&family=Space+Mono&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f1f5f9;--card:#fff;--border:#e2e8f0;--border2:#cbd5e1;
  --t1:#0f172a;--t2:#1e293b;--t3:#475569;--t4:#94a3b8;
  --blue:#2563eb;--amber:#d97706;--purple:#7c3aed;--red:#dc2626;--indigo:#4f46e5;
  --sh:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --sh2:0 4px 16px rgba(0,0,0,.09);
  --sh3:0 12px 32px rgba(0,0,0,.13);
  --r:12px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--t1);font-family:'Noto Sans KR','Inter',sans-serif;min-height:100vh}
a{text-decoration:none;color:inherit}
.w{max-width:1440px;margin:0 auto;padding:0 20px}

/* HEADER */
header{background:#fff;border-bottom:1px solid var(–border);position:sticky;top:0;z-index:200;box-shadow:var(–sh)}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 0}
.logo{display:flex;align-items:center;gap:10px}
.logo-ic{width:38px;height:38px;background:linear-gradient(135deg,#4f46e5,#7c3aed);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 3px 10px rgba(79,70,229,.4)}
.logo-name{font-size:16px;font-weight:800;color:var(–t1)}
.logo-name em{color:var(–indigo);font-style:normal}
.logo-desc{font-size:10px;color:var(–t4);font-family:‘Space Mono’,monospace;margin-top:1px}
.hdr-r{display:flex;align-items:center;gap:10px}
.live-pill{display:flex;align-items:center;gap:5px;background:#fef2f2;border:1px solid #fecaca;border-radius:20px;padding:3px 11px;font-size:10px;font-weight:700;color:#ef4444;font-family:‘Space Mono’,monospace}
.ld{width:5px;height:5px;background:#ef4444;border-radius:50%;animation:blink 1.2s infinite}
@keyframes blink{50%{opacity:.2}}
#clock{font-family:‘Space Mono’,monospace;font-size:11px;color:var(–t3);background:var(–bg);padding:4px 10px;border-radius:20px;border:1px solid var(–border)}

/* AI PANEL */
.ai-card{background:#fff;border-radius:16px;border:1px solid var(–border);overflow:hidden;box-shadow:var(–sh2);margin:20px 0 16px}
.ai-top{background:linear-gradient(135deg,#4f46e5,#7c3aed,#2563eb);padding:20px 24px;display:flex;align-items:flex-start;gap:14px}
.ai-av{width:48px;height:48px;background:rgba(255,255,255,.2);border:2px solid rgba(255,255,255,.35);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.ai-t{font-size:17px;font-weight:800;color:#fff}
.ai-s{font-size:11px;color:rgba(255,255,255,.7);font-family:‘Space Mono’,monospace;margin-top:2px}
.ai-body{padding:18px 24px 20px}
#sumText{font-size:14px;line-height:1.85;color:var(–t2)}
#sumText strong{color:var(–indigo);font-weight:700}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
.tag{background:#eef2ff;border:1px solid #c7d2fe;border-radius:20px;padding:3px 11px;font-size:11px;color:#4338ca;font-weight:600}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.upd{font-size:11px;color:var(–t4);font-family:‘Space Mono’,monospace}
.ref-btn{display:flex;align-items:center;gap:6px;background:#fff;border:1px solid var(–border2);border-radius:8px;padding:7px 14px;font-size:12px;font-weight:600;color:var(–t2);cursor:pointer;transition:all .2s;box-shadow:var(–sh);font-family:‘Noto Sans KR’,sans-serif}
.ref-btn:hover{background:#f8fafc;border-color:#64748b}
.spin .ico{animation:rotate 1s linear infinite;display:inline-block}
@keyframes rotate{to{transform:rotate(360deg)}}

/* TABS */
.tabs{display:flex;gap:3px;background:#fff;border:1px solid var(–border);border-radius:10px;padding:3px;margin-bottom:20px;width:fit-content;box-shadow:var(–sh);flex-wrap:wrap}
.tb{padding:7px 17px;border:none;background:transparent;color:var(–t3);font-size:12px;font-weight:500;border-radius:7px;cursor:pointer;transition:all .2s;white-space:nowrap;font-family:‘Noto Sans KR’,sans-serif}
.tb.on{background:var(–indigo);color:#fff;font-weight:700;box-shadow:0 2px 8px rgba(79,70,229,.35)}
.tc{display:none}.tc.on{display:block}

/* SECTION */
.sec{display:flex;align-items:center;gap:10px;margin:28px 0 14px}
.sec-p{display:flex;align-items:center;gap:7px;padding:5px 14px;border-radius:30px;font-size:12px;font-weight:700}
.sec-p.ko{background:#eff6ff;color:#1d4ed8;border:1.5px solid #bfdbfe}
.sec-p.en{background:#fffbeb;color:#b45309;border:1.5px solid #fde68a}
.sec-p.vb{background:#f5f3ff;color:#6d28d9;border:1.5px solid #ddd6fe}
.sec-p.yt{background:#fef2f2;color:#dc2626;border:1.5px solid #fecaca}
.sec-n{background:#f8fafc;border:1px solid var(–border);border-radius:20px;padding:2px 9px;font-size:10px;color:var(–t4);font-family:‘Space Mono’,monospace}
.sec-line{flex:1;height:1px;background:var(–border)}

/* NEWS GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;margin-bottom:4px}

.card{background:#fff;border:1px solid var(–border);border-radius:var(–r);overflow:hidden;display:flex;flex-direction:column;box-shadow:var(–sh);transition:all .22s;text-decoration:none}
.card:hover{transform:translateY(-3px);box-shadow:var(–sh3)}
.card.ko:hover{border-color:#93c5fd}
.card.en:hover{border-color:#fcd34d}
.card.vb:hover{border-color:#c4b5fd}

.c-img{width:100%;height:168px;object-fit:cover;display:block;flex-shrink:0;background:#f1f5f9}
.c-ph{width:100%;height:168px;display:flex;align-items:center;justify-content:center;font-size:46px;flex-shrink:0}
.ph0{background:linear-gradient(135deg,#dbeafe,#ede9fe)}
.ph1{background:linear-gradient(135deg,#fce7f3,#fef3c7)}
.ph2{background:linear-gradient(135deg,#d1fae5,#dbeafe)}
.ph3{background:linear-gradient(135deg,#fef3c7,#fce7f3)}
.ph4{background:linear-gradient(135deg,#ede9fe,#d1fae5)}

.c-body{padding:13px;flex:1;display:flex;flex-direction:column}
.c-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.c-badge{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:2px 8px;border-radius:20px;font-family:‘Space Mono’,monospace}
.c-badge.ko{background:#dbeafe;color:#1e40af}
.c-badge.en{background:#fef3c7;color:#92400e}
.c-badge.vb{background:#ede9fe;color:#5b21b6}
.c-date{font-size:10px;color:var(–t4);font-family:‘Space Mono’,monospace}
.c-title{font-size:13px;font-weight:700;line-height:1.55;color:var(–t1);margin-bottom:7px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.c-desc{font-size:11px;color:var(–t3);line-height:1.65;flex:1;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.c-foot{margin-top:10px;padding-top:9px;border-top:1px solid var(–border);display:flex;align-items:center;justify-content:space-between}
.c-go{font-size:11px;font-weight:700;color:var(–indigo);display:flex;align-items:center;gap:3px;transition:gap .15s}
.card:hover .c-go{gap:6px}
/* 검색 배지 — fallback 카드에 표시 */
.search-badge{font-size:9px;background:#fef9c3;border:1px solid #fde047;color:#854d0e;border-radius:20px;padding:2px 7px;font-family:‘Space Mono’,monospace;font-weight:600}

/* YT */
.yt-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.yc{background:#fff;border:1px solid var(–border);border-radius:var(–r);overflow:hidden;cursor:pointer;transition:all .22s;box-shadow:var(–sh)}
.yc:hover{transform:translateY(-3px);box-shadow:var(–sh3);border-color:#fca5a5}
.yt-tw{position:relative;width:100%;padding-top:56.25%;background:#000;overflow:hidden}
.yt-tw img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;transition:transform .3s}
.yc:hover .yt-tw img{transform:scale(1.04)}
.yt-pl{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:50px;height:50px;background:rgba(220,38,38,.9);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:17px;box-shadow:0 4px 20px rgba(220,38,38,.5);transition:all .2s}
.yc:hover .yt-pl{transform:translate(-50%,-50%) scale(1.1);background:#dc2626}
.yc-body{padding:12px}
.yc-ch{font-size:10px;color:var(–red);font-family:‘Space Mono’,monospace;letter-spacing:1px;font-weight:700;text-transform:uppercase;margin-bottom:5px}
.yc-title{font-size:12px;font-weight:700;line-height:1.5;color:var(–t1);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.yc-date{margin-top:7px;font-size:10px;color:var(–t4);font-family:‘Space Mono’,monospace}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;align-items:center;justify-content:center;backdrop-filter:blur(6px)}
.modal-bg.on{display:flex}
.modal-box{background:#fff;border-radius:16px;width:93%;max-width:900px;overflow:hidden;position:relative;box-shadow:0 25px 60px rgba(0,0,0,.35)}
.modal-box iframe{width:100%;aspect-ratio:16/9;display:block}
.modal-x{position:absolute;top:10px;right:10px;background:rgba(0,0,0,.65);border:none;color:#fff;width:34px;height:34px;border-radius:50%;font-size:15px;cursor:pointer;z-index:10;display:flex;align-items:center;justify-content:center}
.modal-x:hover{background:#dc2626}

.mt-empty{grid-column:1/-1;text-align:center;padding:50px;color:var(–t4);font-size:13px}
footer{margin-top:50px;background:#fff;border-top:1px solid var(–border);padding:20px 0;text-align:center;font-size:10px;color:var(–t4);font-family:‘Space Mono’,monospace;letter-spacing:1px}

@media(max-width:640px){
.grid,.yt-grid{grid-template-columns:1fr}
.logo-name{font-size:14px}
.ai-top{padding:14px 16px}
.ai-body{padding:14px 16px}
.tb{padding:6px 10px;font-size:11px}
}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(–bg)}
::-webkit-scrollbar-thumb{background:var(–border2);border-radius:3px}
</style>

</head>
<body>

<header>
  <div class="w">
    <div class="hdr">
      <div class="logo">
        <div class="logo-ic">🤖</div>
        <div>
          <div class="logo-name">AI <em>Manufacturing</em> Nexus</div>
          <div class="logo-desc">실시간 AI 뉴스 · API키 불필요 · 자동갱신</div>
        </div>
      </div>
      <div class="hdr-r">
        <div class="live-pill"><div class="ld"></div>LIVE</div>
        <div id="clock">--:--:--</div>
      </div>
    </div>
  </div>
</header>

<div class="w">
  <div class="ai-card">
    <div class="ai-top">
      <div class="ai-av">🧠</div>
      <div><div class="ai-t">AI 비서</div><div class="ai-s">오늘의 뉴스 내용을 요약드립니다</div></div>
    </div>
    <div class="ai-body">
      <div id="sumText">뉴스를 불러오는 중입니다...</div>
      <div class="tags" id="sumTags"></div>
    </div>
  </div>

  <div class="toolbar">
    <span class="upd" id="upd"></span>
    <button class="ref-btn" id="refBtn" onclick="doLoad(true)"><span class="ico">↻</span> 새로고침</button>
  </div>

  <div class="tabs">
    <button class="tb on" onclick="gotoTab('all',this)">🗂 전체</button>
    <button class="tb" onclick="gotoTab('ko',this)">🇰🇷 한국어</button>
    <button class="tb" onclick="gotoTab('en',this)">🌐 영문</button>
    <button class="tb" onclick="gotoTab('vb',this)">⚡ Vibe Coding</button>
    <button class="tb" onclick="gotoTab('yt',this)">▶ YouTube</button>
  </div>

  <div class="tc on" id="tab-all">
    <div class="sec"><div class="sec-p ko">🇰🇷 한국 AI 뉴스</div><div class="sec-n" id="kN">-</div><div class="sec-line"></div></div>
    <div class="grid" id="kG"></div>
    <div class="sec"><div class="sec-p en">🌐 Global AI News</div><div class="sec-n" id="eN">-</div><div class="sec-line"></div></div>
    <div class="grid" id="eG"></div>
    <div class="sec"><div class="sec-p vb">⚡ Vibe Coding 최신 동향</div><div class="sec-n" id="vN">-</div><div class="sec-line"></div></div>
    <div class="grid" id="vG"></div>
    <div class="sec"><div class="sec-p yt">▶ Vibe Coding YouTube</div><div class="sec-n" id="yN">-</div><div class="sec-line"></div></div>
    <div class="yt-grid" id="yG"></div>
  </div>
  <div class="tc" id="tab-ko"><div class="sec"><div class="sec-p ko">🇰🇷 한국 AI 뉴스</div><div class="sec-line"></div></div><div class="grid" id="kG2"></div></div>
  <div class="tc" id="tab-en"><div class="sec"><div class="sec-p en">🌐 Global AI News</div><div class="sec-line"></div></div><div class="grid" id="eG2"></div></div>
  <div class="tc" id="tab-vb"><div class="sec"><div class="sec-p vb">⚡ Vibe Coding</div><div class="sec-line"></div></div><div class="grid" id="vG2"></div></div>
  <div class="tc" id="tab-yt"><div class="sec"><div class="sec-p yt">▶ YouTube</div><div class="sec-line"></div></div><div class="yt-grid" id="yG2"></div></div>

  <footer>AI MANUFACTURING NEXUS &nbsp;·&nbsp; RSS 기반 · API 키 불필요 &nbsp;·&nbsp; © 2025</footer>
</div>

<div class="modal-bg" id="vMod">
  <div class="modal-box">
    <button class="modal-x" onclick="closeV()">✕</button>
    <iframe id="vFr" src="" frameborder="0" allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture" allowfullscreen></iframe>
  </div>
</div>

<script>
/* ── CLOCK ────────────────────────────────────── */
setInterval(()=>{
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('ko-KR',{hour12:false})+' KST';
},1000);

/* ── STATE ────────────────────────────────────── */
const D={ko:[],en:[],vb:[],yt:[]};

/* ── URL HELPERS ──────────────────────────────── */
// 네이버 뉴스 검색 — 제목으로 검색하면 실제 기사가 나옴
function naverSearch(title){
  return 'https://search.naver.com/search.naver?where=news&query='+encodeURIComponent(title);
}
// 구글 뉴스 검색
function googleSearch(title){
  return 'https://www.google.com/search?q='+encodeURIComponent(title)+'&tbm=nws';
}
// 실제 기사 URL인지 확인 (홈페이지 루트 아닌 경우)
function isRealArticle(url){
  if(!url) return false;
  try{
    const u=new URL(url);
    // 경로가 2자 이상이고, 가짜 ID 패턴 없어야 함
    if(u.pathname.length < 3) return false;
    // Date.now() 로 만든 가짜 URL 패턴 차단
    if(/\d{13}/.test(url)) return false;
    return true;
  }catch(e){return false;}
}

/* ── RSS2JSON ─────────────────────────────────── */
const R2J='https://api.rss2json.com/v1/api.json?rss_url=';
async function fetchRSS(feedUrl, count=25){
  try{
    const r=await fetch(R2J+encodeURIComponent(feedUrl)+'&count='+count,
      {signal:AbortSignal.timeout(10000)});
    const j=await r.json();
    if(j.status==='ok' && j.items?.length) return j.items;
  }catch(e){}
  return [];
}

/* ── ALLORIGINS proxy for YouTube XML ─────────── */
async function fetchText(url){
  try{
    const r=await fetch('https://api.allorigins.win/get?url='+encodeURIComponent(url),
      {signal:AbortSignal.timeout(9000)});
    const j=await r.json();
    return j.contents||'';
  }catch(e){return '';}
}

/* ── RSS FEEDS ────────────────────────────────── */
const KO_FEEDS=[
  {url:'https://www.aitimes.kr/rss/allArticle.xml',      src:'AI타임스'},
  {url:'https://www.aitimes.com/rss/allArticle.xml',     src:'AI타임스닷컴'},
  {url:'https://zdnet.co.kr/rss/newsAllArticle.xml',     src:'ZDNet Korea'},
  {url:'https://www.etnews.com/rss/allArticle.xml',      src:'전자신문'},
  {url:'https://www.mk.co.kr/rss/30200030/',             src:'매일경제'},
  {url:'https://feeds.feedburner.com/bloter',            src:'블로터'},
];
const EN_FEEDS=[
  {url:'https://techcrunch.com/feed/',                                              src:'TechCrunch'},
  {url:'https://feeds.feedburner.com/venturebeat/SZYF',                            src:'VentureBeat'},
  {url:'https://www.theverge.com/rss/ai-artificial-intelligence/index.xml',        src:'The Verge AI'},
  {url:'https://www.technologyreview.com/feed/',                                   src:'MIT Tech Review'},
  {url:'https://hnrss.org/frontpage',                                              src:'Hacker News'},
  {url:'https://rss.nytimes.com/services/xml/rss/nyt/Technology.xml',             src:'NYT Tech'},
  {url:'https://www.artificialintelligence-news.com/feed/',                        src:'AI News'},
];
const VB_FEEDS=[
  {url:'https://hnrss.org/frontpage?q=vibe+coding',          src:'HN · Vibe Coding'},
  {url:'https://hnrss.org/frontpage?q=cursor+windsurf',      src:'HN · Cursor/Windsurf'},
  {url:'https://hnrss.org/frontpage?q=AI+coding+agent',      src:'HN · AI Agent'},
  {url:'https://hnrss.org/frontpage?q=claude+coding',        src:'HN · Claude'},
  {url:'https://techcrunch.com/tag/ai/feed/',                src:'TechCrunch AI'},
  {url:'https://www.theverge.com/rss/ai-artificial-intelligence/index.xml', src:'The Verge AI'},
];

/* ── UTILS ────────────────────────────────────── */
function stripHtml(s){
  return (s||'').replace(/<[^>]+>/g,'').replace(/&[a-z#0-9]+;/g,' ').replace(/\s+/g,' ').trim();
}
function extractImg(html){
  const m=(html||'').match(/<img[^>]+src=["']([^"'?]+)["']/i);
  return m&&!m[1].includes('pixel')&&!m[1].includes('track')?m[1]:null;
}
function esc(s){
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function dedup(arr,key='title'){
  const s=new Set();
  return arr.filter(a=>{
    const k=(a[key]||'').trim().slice(0,55);
    if(!k||s.has(k))return false;
    s.add(k);return true;
  });
}
function dxml(s){
  return (s||'').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>')
    .replace(/&quot;/g,'"').replace(/&#39;/g,"'")
    .replace(/<!\[CDATA\[([\s\S]*?)\]\]>/g,'$1').trim();
}
function todayMinus(n){
  const d=new Date(); d.setDate(d.getDate()-n);
  return d.toISOString().slice(0,10);
}
// Is article URL fresh (within last 60 days)?
function isFresh(dateStr){
  if(!dateStr) return true;
  const d=new Date(dateStr);
  if(isNaN(d)) return true;
  return (Date.now()-d.getTime()) < 60*24*60*60*1000;
}

/* ── LOAD NEWS FEEDS ──────────────────────────── */
async function loadFeeds(feeds, kwList, limit){
  const promises=feeds.map(f=>fetchRSS(f.url,25).then(items=>({items,src:f.src})));
  const results=await Promise.allSettled(promises);
  let out=[];
  for(const r of results){
    if(r.status!=='fulfilled') continue;
    const {items,src}=r.value;
    for(const item of items){
      const link=item.link||item.guid||'';
      // ★ Only accept real article URLs
      if(!isRealArticle(link)) continue;
      const txt=((item.title||'')+' '+(item.description||'')).toLowerCase();
      const pass=!kwList||kwList.some(k=>txt.includes(k));
      if(!pass) continue;
      const dateStr=(item.pubDate||'').slice(0,10);
      if(!isFresh(dateStr)) continue;
      const imgRaw=item.enclosure?.link||item.thumbnail||extractImg(item.description||item.content||'')||null;
      out.push({
        title: item.title||'',
        desc:  stripHtml(item.description||item.content||'').slice(0,200),
        url:   link,          // ★ real article URL from RSS
        image: imgRaw,
        source:src,
        date:  dateStr||todayMinus(0),
        real:  true           // flag: came from RSS
      });
    }
    if(out.length>=limit+10) break;
  }
  return dedup(out).slice(0,limit);
}

/* ── YOUTUBE via RSS ──────────────────────────── */

const YT_KW=['vibe','coding','cursor','windsurf','claude','copilot','devin','replit','ai','agent','llm','gpt'];

async function loadYT(){
  let fromRSS=[];
  const promises=YT_CH.map(async ch=>{
    const xml=await fetchText(`https://www.youtube.com/feeds/videos.xml?channel_id=${ch.id}`);
    if(!xml) return [];
    const entries=xml.match(/<entry>([\s\S]*?)<\/entry>/g)||[];
    return entries.slice(0,3).map(e=>{
      const vid=(e.match(/<yt:videoId>(.*?)<\/yt:videoId>/)||[])[1]||'';
      const title=dxml((e.match(/<title>(.*?)<\/title>/)||[])[1]||'');
      const date=(e.match(/<published>(.*?)<\/published>/)||[])[1]||'';
      const relevant=YT_KW.some(k=>title.toLowerCase().includes(k));
      return {id:vid,title,channel:ch.name,
        thumb:`https://img.youtube.com/vi/${vid}/hqdefault.jpg`,
        date:date.slice(0,10),relevant};
    }).filter(v=>v.id);
  });
  const results=await Promise.allSettled(promises);
  for(const r of results){
    if(r.status==='fulfilled') fromRSS.push(...r.value);
  }

  // Sort: relevant first, then by date
  fromRSS.sort((a,b)=>{
    if(a.relevant&&!b.relevant) return -1;
    if(!a.relevant&&b.relevant) return 1;
    return (b.date||'').localeCompare(a.date||'');
  });
  fromRSS=dedup(fromRSS,'id');

  // Pad with seed videos to guarantee 10
  const seedFiltered=YT_SEED.filter(s=>!fromRSS.some(v=>v.id===s.id));
  const combined=dedup([...fromRSS,...seedFiltered],'id').slice(0,10);
  return combined;
}

function renderNews(gid,items,cls){
  const g=document.getElementById(gid);
  if(!g)return;
  if(!items||!items.length){
    g.innerHTML='<div class="mt-empty">뉴스를 불러오지 못했습니다</div>';return;
  }
  g.innerHTML=items.map((a,i)=>{
    const imgHtml=a.image
      ?`<img class="c-img" src="${esc(a.image)}" loading="lazy"
          onerror="this.outerHTML='${ph(i).replace(/'/g,"&#39;")}';">`
      :ph(i);

    // ★ If real RSS URL → use it. Otherwise use Naver search.
    const href=a.real?esc(a.url):naverSearch(a.title);
    const linkNote=a.real
      ?''
      :'<span class="search-badge">🔍 검색으로 연결</span>';

    return `<a class="card ${cls}" href="${href}" target="_blank" rel="noopener noreferrer">
      ${imgHtml}
      <div class="c-body">
        <div class="c-meta">
          <span class="c-badge ${cls}">${esc(a.source)}</span>
          <span class="c-date">${esc(a.date)}</span>
        </div>
        <div class="c-title">${esc(a.title)}</div>
        <div class="c-desc">${esc(a.desc)}</div>
        <div class="c-foot">
          ${linkNote}
          <span class="c-go">${a.real?'기사 읽기 →':'검색 결과 →'}</span>
        </div>
      </div>
    </a>`;
  }).join('');
}

  const kws=xkw([...D.ko,...D.en,...D.vb].map(a=>a.title));
  document.getElementById('sumTags').innerHTML=kws.slice(0,9).map(k=>`<div class="tag">#${esc(k)}</div>`).join('');

function xkw(titles){
  const stop=new Set(['the','a','an','is','in','of','for','to','and','on','with','at','by','이','가','을','를','은','는','한','의','로','에서','기','이나','등','및','에','ai','its','it','new','how','why','what','from','are','was']);
  const freq={};
  titles.join(' ').split(/[\s,.\-:;()'"!?\|\/\[\]]+/).forEach(w=>{
    const c=w.replace(/[^가-힣a-zA-Z0-9]/g,'');
    if(c.length>2&&!stop.has(c)&&!stop.has(c.toLowerCase()))freq[c]=(freq[c]||0)+1;
  });
  return Object.entries(freq).sort((a,b)=>b[1]-a[1]).map(e=>e[0]);
}

window.addEventListener('DOMContentLoaded',()=>{
  // Show fallback instantly with search links
  D.ko=fbKo();D.en=fbEn();D.vb=fbVb();D.yt=YT_SEED;
  renderAll();buildSummary();
  document.getElementById('upd').textContent='기본 데이터 표시 중 (검색 링크) — RSS 로드 중...';

  // Try cache (< 20 min)
  try{
    const c=JSON.parse(localStorage.getItem('nxCache')||'{}');
    if(c.data&&c.ts&&Date.now()-c.ts<20*60*1000){
      Object.assign(D,c.data);
      renderAll();buildSummary();
      document.getElementById('upd').textContent=
        '캐시 · '+new Date(c.ts).toLocaleTimeString('ko-KR');
      return;
    }
  }catch(e){}

  doLoad(false);
  setInterval(()=>doLoad(true), 30*60*1000);
});
</script>
